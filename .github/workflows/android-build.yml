name: Android Build

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Gradle Cache
      uses: gradle/gradle-build-action@v2

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true

    - name: Install dependencies
      run: flutter pub get

    - name: Run build_runner (Hive Adapters)
      run: flutter pub run build_runner build --delete-conflicting-outputs

    - name: Analyze Code
      run: flutter analyze

    - name: Run Tests
      run: flutter test

    - name: Decode Keystore and Properties
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
      run: |
        echo "$KEYSTORE_BASE64" | base64 --decode > /tmp/upload-keystore.jks
        echo "storePassword=$STORE_PASSWORD" > android/key.properties
        echo "keyPassword=$KEY_PASSWORD" >> android/key.properties
        echo "keyAlias=$KEY_ALIAS" >> android/key.properties
        echo "storeFile=/tmp/upload-keystore.jks" >> android/key.properties

    - name: Build APK
      run: flutter build apk --release --build-number=$GITHUB_RUN_NUMBER

    - name: Build AAB (App Bundle)
      run: flutter build appbundle --release --build-number=$GITHUB_RUN_NUMBER

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: Zekat-Hesaplama-Araci-APK
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 7

    - name: Upload AAB artifact
      uses: actions/upload-artifact@v4
      with:
        name: Zekat-Hesaplama-Araci-AAB
        path: build/app/outputs/bundle/release/app-release.aab
        retention-days: 7

    - name: Upload to Google Play
      if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
      uses: r0adkll/upload-google-play@v1
      with:
        serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_JSON_KEY }}
        packageName: com.sefayilmaz.zekatapp.zekat_app_mobile
        releaseFiles: build/app/outputs/bundle/release/app-release.aab
        track: internal
        status: completed
